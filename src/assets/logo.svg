<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 96" width="500" height="96" role="img" aria-label="RONNY">
  <title>RONNY</title>
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@600&amp;family=JetBrains+Mono:wght@500&amp;display=swap');
      .name { font-family: 'Cinzel', serif; font-weight: 600; font-size: 52px; letter-spacing: 6px; fill: #f3e7c9; }
      .bracket { font-family: 'JetBrains Mono', monospace; font-weight: 500; font-size: 38px; fill: #c9a24b; opacity: 0.65; }
    </style>
    <filter id="boltGlow" x="-60%" y="-60%" width="220%" height="220%">
      <feDropShadow dx="0" dy="0" stdDeviation="3.5" flood-color="#f0d68a" flood-opacity="0.7"/>
    </filter>
  </defs>

  <!-- opening bracket -->
  <text class="bracket" x="117" y="62" text-anchor="end">&lt;</text>

  <!-- RO -->
  <text class="name" x="207" y="66" text-anchor="end">RO</text>

  <!-- lightning bolt (middle "N") -->
  <g transform="translate(221.3 16) scale(1.867)" filter="url(#boltGlow)">
    <path d="M12 0 L2 17 L9 17 L7 30 L18 11 L11 11 Z" fill="#f0d68a"/>
  </g>

  <!-- NY -->
  <text class="name" x="273" y="66" text-anchor="start">NY</text>

  <!-- closing bracket -->
  <text class="bracket" x="363" y="62" text-anchor="start">/&gt;</text>
</svg>
